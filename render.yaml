services:
  - type: web
    name: chatleads-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard — use Render PostgreSQL or Supabase URL
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: OPENAI_API_KEY
        value: optional_if_provider_is_openai
      - key: CORS_ORIGINS
        value: https://chat-leads-ai.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
